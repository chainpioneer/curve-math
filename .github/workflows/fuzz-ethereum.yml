name: Fuzz Ethereum

on:
  push:
    branches: [master]
    paths-ignore:
      - 'crates/curve-math/tests/registry/**'
      - 'crates/curve-math/tools/**'
      - '*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'crates/curve-math/tests/registry/**'
      - 'crates/curve-math/tools/**'
      - '*.md'

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Registry Fuzz (Chain 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run registry fuzz
        env:
          RPC_URL_1: ${{ secrets.RPC_URL_1 }}
          FUZZ_ITERATIONS: "100"
        run: |
          if [ -z "$RPC_URL_1" ]; then
            echo "::warning::RPC_URL_1 not set, skipping fuzz"
            exit 0
          fi
          cargo test -p curve-math --features swap --test fuzz_registry -- fuzz_1 --ignored --nocapture --test-threads=1
