name: Fuzz Base

on:
  push:
    branches: [master]
    paths-ignore:
      - 'crates/curve-adapter/tests/registry/**'
      - 'crates/curve-math/tools/**'
      - '*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'crates/curve-adapter/tests/registry/**'
      - 'crates/curve-math/tools/**'
      - '*.md'

concurrency:
  group: fuzz-rpc-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Registry Fuzz (Chain 8453)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run registry fuzz
        env:
          RPC_URL_8453: ${{ secrets.RPC_URL_8453 }}
          FUZZ_ITERATIONS: "100"
        run: |
          if [ -z "$RPC_URL_8453" ]; then
            echo "::warning::RPC_URL_8453 not set, skipping fuzz"
            exit 0
          fi
          cargo test -p curve-adapter --test fuzz_registry -- fuzz_8453 --ignored --nocapture --test-threads=1
